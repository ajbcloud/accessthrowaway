name: CI

# Fast checks on every push and pull request. The tool has no runtime
# dependencies, so this just syntax-checks and runs the unit tests.
on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check
        run: node --check ua-elevator-probe.js

      - name: Run tests
        run: node --test
